<html>
<head>
<link rel="stylesheet" href="../../css/spectre.min.css">

<style>
.dragrow { cursor:move; }
.folder { font-weight:bold; }
.breadcrumb { margin-bottom:10px; }
</style>

</head>

<body class="container">

<h3>Intentional Editor</h3>

<div class="breadcrumb" id="breadcrumb"></div>

<table class="table" id="taskTable">
<thead>
<tr>
<th></th>
<th>Name</th>
<th>Intent</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>

<button class="btn btn-primary" onclick="addTask()">Add Task</button>
<button class="btn" onclick="addFolder()">Add Folder</button>
<button class="btn" onclick="addSeparator()">Add Separator</button>
<br>
<button class="btn" onclick="downloadJSON()">Download JSON</button>

<button class="btn"
        onclick="document.getElementById('loadJSON').click()">
  Load JSON
</button>
<br>
<button class="btn btn-success"
        onclick="upload()">
  Save to Watch
</button>

<input
  type="file"
  id="loadJSON"
  accept=".json"
  style="display:none"
  onchange="loadJSON(event)">

<script src="../../core/lib/customize.js"></script>

<script>

let data = {items:[]};
let path = [];
let dragIndex = null;
let installedApps = [];

window.addEventListener("message", event => {

  if (event.data.type === "init") {

    installedApps = event.data.data.appsInstalled || [];

    console.log("Installed apps:", installedApps);

  }

});

// ---------- Draw Table ----------
function drawTable(){

  drawBreadcrumb();

  let tbody = document.querySelector("#taskTable tbody");
  tbody.innerHTML="";

  let items = getCurrentItems();

  items.forEach((item,i)=>{

    let row = document.createElement("tr");
    row.className="dragrow";
    row.draggable=true;

    row.ondragstart = ()=>dragIndex=i;
    row.ondragover = e=>e.preventDefault();
    row.ondrop = ()=>dropRow(i);


    if(item.type==="task"){

      row.innerHTML=`
      <td>☰</td>
      <td><input class="form-input" value="${item.name||""}" onchange="getCurrentItems()[${i}].name=this.value"></td>
      <td><input class="form-input" value="${item.intent||""}" onchange="getCurrentItems()[${i}].intent=this.value"></td>
      <td><button class="btn btn-error btn-sm" onclick="removeItem(${i})">Delete</button></td>
      `;

    }


    if(item.type==="folder"){

      row.innerHTML=`
      <td>☰</td>
      <td>
        <input class="form-input"
          value="${item.name||'Folder'}"
          onchange="getCurrentItems()[${i}].name=this.value">
      </td>
      <td></td>
      <td>
      <button class="btn btn-primary btn-sm" onclick="openFolder(${i})">Open</button>
      <button class="btn btn-error btn-sm" onclick="removeItem(${i})">Delete</button>
      </td>
      `;

    }

    if(item.type==="separator"){

      row.innerHTML=`
      <td>☰</td>
      <td colspan="2"><b>==============</b></td>
      <td><button class="btn btn-error btn-sm" onclick="removeItem(${i})">Delete</button></td>
      `;

    }
    
if(item.type==="app"){

  row.innerHTML=`
  <td>☰</td>

  <td>
  <input class="form-input"
    value="${item.name||""}"
    onchange="getCurrentItems()[${i}].name=this.value">
  </td>

  <td>
    <input class="form-input"
    value="${item.app||''}"
    onchange="getCurrentItems()[${i}].app=this.value">
  </td>

  <td>
    <button class="btn btn-error btn-sm"
    onclick="removeItem(${i})">Delete</button>
  </td>
  `;

}

  tbody.appendChild(row);

});

}


// ---------- Load existing data ----------
function gotStored(stored) {
  console.log("gotStored", stored);

  data = stored || { items: [] };

  if (!data.items)
    data = { items: [] };

  drawTable();
}

function getLaunchableApps() {

  return installedApps.filter(app => {

    if (!app.files) return false;

    if (!app.files.includes(".app.js")) return false;

    if (app.type === "widget") return false;
    if (app.type === "module") return false;
    if (app.type === "bootloader") return false;

    return true;
  });

}

function fillAppList() {

  let sel = document.getElementById("appSelect");

  sel.innerHTML = "";

  getLaunchableApps().forEach(app => {

    let opt = document.createElement("option");

    opt.value = app.id;
    opt.textContent = app.name || app.id;

    sel.appendChild(opt);

  });

}
// ---------- download/Load Json ----------
function downloadJSON() {

  const blob = new Blob(
    [JSON.stringify(data, null, 2)],
    { type: "application/json" }
  );

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "intentional.json";

  a.click();

  URL.revokeObjectURL(a.href);
}

  function loadJSON(event) {

  const file = event.target.files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {

    try {

      const imported = JSON.parse(e.target.result);

      if (!imported.items)
        throw new Error("Invalid format");

      data = imported;

      drawTable();

      alert("JSON loaded successfully");

    } catch(err) {

      alert("Invalid JSON file");

    }

  };

  reader.readAsText(file);
}
  
function onInit() {
  downloadJSONfile("intentional.json", gotStored);
}

function downloadJSONfile(fileid, callback) {
  Puck.write(`\x10(function() {
    var data = require("Storage").readJSON("${fileid}",1) || {items:[]};
    Bluetooth.print(JSON.stringify(data));
  })()\n`, contents => {

    console.log("Downloaded:", contents);

    let stored;

    try {
      stored = JSON.parse(contents);
    } catch(e) {
      stored = {items:[]};
    }

    callback(stored);
  });
}

// ---------- Utility ----------
function getCurrentItems(){

  let items = data.items;

  path.forEach(i=>{
    if(items[i] && items[i].items)
      items = items[i].items;
  });

  return items;
}


// ---------- Breadcrumb ----------
function drawBreadcrumb(){

  let bc = document.getElementById("breadcrumb");

  let html = `<button class="btn btn-sm" onclick="goRoot()">Root</button>`;

  let items = data.items;

  path.forEach((index,i)=>{

    let name = items[index].name || "Folder";

    html += ` / <button class="btn btn-sm" onclick="goLevel(${i})">${name}</button>`;

    items = items[index].items;

  });

  bc.innerHTML = html;
}


// ---------- Drag Sorting ----------
function dropRow(newIndex){

  let items = getCurrentItems();

  let item = items.splice(dragIndex,1)[0];
  items.splice(newIndex,0,item);

  drawTable();
}


// ---------- Navigation ----------
function openFolder(i){
  path.push(i);
  drawTable();
}

function goRoot(){
  path=[];
  drawTable();
}

function goLevel(level){
  path = path.slice(0,level+1);
  drawTable();
}


// ---------- Actions ----------
function addTask(){

  getCurrentItems().push({
    type:"task",
    name:"New Task",
    intent:"com.example.INTENT"
  });

  drawTable();
}

function addFolder(){

  getCurrentItems().push({
    type:"folder",
    name:"New Folder",
    items:[]
  });

  drawTable();
}
function addApp() {

  let apps = getLaunchableApps();

  if (!apps.length) {
    alert("No launchable apps found");
    return;
  }

  let app = apps[0];

  getCurrentItems().push({
    type:"app",
    name: app.name || app.id,
    app: app.id + ".app.js"
  });

  drawTable();
}

function addSeparator(){

  getCurrentItems().push({
    type:"separator"
  });

  drawTable();
}

function removeItem(i){

  getCurrentItems().splice(i,1);
  drawTable();
}


// ---------- Upload ----------
function upload(){

  sendCustomizedApp({
    storage:[
      {
        name:"intentional.json",
        content:JSON.stringify(data)
      }
    ]
  });

}

</script>

</body>
</html>
